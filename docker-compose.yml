services:
  brave:
    build:
      context: .
      dockerfile: Dockerfile
    image: local/brave-arm64:latest
    container_name: brave
    # Required for GUI app syscall compatibility
    security_opt:
      - seccomp=unconfined
    # Required for Cloudflare WARP VPN (creates tun/wg interfaces)
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Kolkata
      # Uncomment to set basic HTTP auth credentials
      # - CUSTOM_USER=user
      # - PASSWORD=password
      # Uncomment for custom Chromium CLI flags
      # - CHROME_CLI=https://www.google.com
      - NO_DECOR=true
      # Wayland is default; set to false to force X11 fallback
      # - PIXELFLUX_WAYLAND=false
    volumes:
      - ./config:/config
      # Persist WARP registration across container restarts
      - warp_data:/var/lib/cloudflare-warp
    ports:
      # HTTPS web UI (primary access)
      - 6969:3000
      # HTTPS web UI (alternative port)
      - 6970:3001
    shm_size: "1gb"
    restart: unless-stopped

volumes:
  warp_data:
